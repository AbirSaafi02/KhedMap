<ion-content>
  <div class="page">
    <div class="header">
      <div>
        <p class="eyebrow">KhedMap alerts</p>
        <h1>Notifications</h1>
      </div>
      <button class="pill-btn" (click)="goHome()">Back to {{ role }} dashboard</button>
    </div>
    <div class="alerts">
      <div class="alert-card" *ngFor="let a of alerts">
        <div class="left">
          <div class="icon-circle" [class.pending]="a.status === 'pending'" [class.approved]="a.status === 'approved'" [class.rejected]="a.status === 'rejected'">
            <ion-icon [name]="a.status === 'approved' ? 'checkmark-circle-outline' : a.status === 'rejected' ? 'close-circle-outline' : 'time-outline'"></ion-icon>
          </div>
          <div>
            <p class="title">{{ a.title }}</p>
            <p class="message">{{ a.message }}</p>
            <div class="meta-row">
              <span class="tag">{{ a.type }}</span>
              <span class="date">{{ a.date }}</span>
            </div>
          </div>
        </div>
        <span class="status" [class.pending]="a.status === 'pending'" [class.approved]="a.status === 'approved'" [class.rejected]="a.status === 'rejected'">
          {{ a.status }}
        </span>
      </div>
    </div>
  </div>
</ion-content>
