<ion-content>
  <div class="page">

    <!-- Header -->
    <div class="header">
      <div>
        <p class="greeting">Welcome back 👋</p>
        <h1 class="discover">Discover</h1>
      </div>
      <div class="notif-btn">
        <ion-icon name="notifications-outline"></ion-icon>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input type="text" placeholder="Search jobs, clients..." />
    </div>

    <!-- Clients section -->
    <div class="section-header">
      <h2>Clients</h2>
      <span class="see-all">See All</span>
    </div>

    <div class="freelancer-scroll">
      <div class="client-card" *ngFor="let c of clients">
        <div class="avatar">{{ c.name[0] }}</div>
        <p class="fname">{{ c.name }}</p>
        <p class="fjob">{{ c.job }}</p>
      </div>
    </div>

    <!-- Category filters -->
    <div class="section-header">
      <h2>Recommendation</h2>
      <span class="see-all">See All</span>
    </div>

    <div class="categories">
      <div
        *ngFor="let cat of categories"
        class="cat-chip"
        [class.active]="activeCategory === cat"
        (click)="setCategory(cat)">
        {{ cat }}
      </div>
    </div>

    <!-- Job cards -->
    <div class="rec-list">
      <div class="rec-card" *ngFor="let r of recommendations"
           (click)="goTo('/freelancer/job-detail')">
        <div class="rec-avatar">{{ r.name[0] }}</div>
        <div class="rec-info">
          <div class="rec-top">
            <span class="rec-name">{{ r.name }}</span>
            <div class="tags">
              <span class="tag" *ngFor="let tag of r.tags">{{ tag }}</span>
            </div>
          </div>
          <p class="rec-bio">{{ r.bio }}</p>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>
    </div>

  </div>
</ion-content>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item" [class.active]="activeTab === 'home'"
       (click)="setTab('home'); goTo('/freelancer/home')">
    <ion-icon name="home-outline"></ion-icon>
    <span>Home</span>
  </div>
  <div class="nav-item" [class.active]="activeTab === 'gigs'"
       (click)="setTab('gigs'); goTo('/freelancer/my-gigs')">
    <ion-icon name="briefcase-outline"></ion-icon>
    <span>My Gigs</span>
  </div>
  <div class="nav-item store-btn" [class.active]="activeTab === 'store'"
       (click)="setTab('store'); goTo('/store')">
    <ion-icon name="storefront-outline"></ion-icon>
    <span>Store</span>
  </div>
  <div class="nav-item" [class.active]="activeTab === 'messages'"
       (click)="setTab('messages'); goTo('/freelancer/messages')">
    <ion-icon name="chatbubble-outline"></ion-icon>
    <span>Messages</span>
  </div>
  <div class="nav-item" [class.active]="activeTab === 'profile'"
       (click)="setTab('profile'); goTo('/freelancer/profile')">
    <ion-icon name="person-outline"></ion-icon>
    <span>Profile</span>
  </div>
</div>
