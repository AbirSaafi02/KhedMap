<ion-content>
  <div class="page">

    <!-- Header -->
    <div class="header">
      <h1 class="title">Messages</h1>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input type="text" placeholder="Search conversations..." />
    </div>

    <!-- Conversations list -->
    <div class="conv-list">
      <div class="conv-item" *ngFor="let c of conversations"
           (click)="goTo('/chat')">

        <div class="avatar" [class.unread-avatar]="c.unread">
          {{ c.name[0] }}
        </div>

        <div class="conv-info">
          <div class="conv-top">
            <span class="conv-name">{{ c.name }}</span>
            <span class="conv-time">{{ c.time }}</span>
          </div>
          <p class="conv-last" [class.unread-text]="c.unread">
            {{ c.last }}
          </p>
        </div>

        <div class="unread-dot" *ngIf="c.unread"></div>

      </div>
    </div>

  </div>
</ion-content>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item" [class.active]="activeTab === 'home'"
       (click)="setTab('home'); goTo('/freelancer/home')">
    <ion-icon name="home-outline"></ion-icon>
    <span>Home</span>
  </div>
  <div class="nav-item" [class.active]="activeTab === 'gigs'"
       (click)="setTab('gigs'); goTo('/freelancer/my-gigs')">
    <ion-icon name="briefcase-outline"></ion-icon>
    <span>My Gigs</span>
  </div>
  <div class="nav-item store-btn" [class.active]="activeTab === 'store'"
       (click)="setTab('store'); goTo('/store')">
    <ion-icon name="storefront-outline"></ion-icon>
    <span>Store</span>
  </div>
  <div class="nav-item active" [class.active]="activeTab === 'messages'"
       (click)="setTab('messages'); goTo('/freelancer/messages')">
    <ion-icon name="chatbubble-outline"></ion-icon>
    <span>Messages</span>
  </div>
  <div class="nav-item" [class.active]="activeTab === 'profile'"
       (click)="setTab('profile'); goTo('/freelancer/profile')">
    <ion-icon name="person-outline"></ion-icon>
    <span>Profile</span>
  </div>
</div>
