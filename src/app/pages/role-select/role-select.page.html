<ion-content>
  <div class="container">
    <h1 class="logo">khedMAP</h1>
    <h2 class="title">Who are you ?</h2>
    <p class="subtitle">Choose your role to begin your journey</p>

    <div class="cards">
      <div class="card" [class.selected]="selectedRole === 'freelancer'"
           (click)="selectRole('freelancer')">
        <div class="icon-circle">
          <ion-icon name="briefcase"></ion-icon>
        </div>
        <h3>Freelancer</h3>
        <p>I am seeking for a job</p>
      </div>

      <div class="card" [class.selected]="selectedRole === 'client'"
           (click)="selectRole('client')">
        <div class="icon-circle">
          <ion-icon name="person"></ion-icon>
        </div>
        <h3>Client</h3>
        <p>I want to find a freelancer</p>
      </div>

      <div class="card center" [class.selected]="selectedRole === 'admin'"
           (click)="selectRole('admin')">
        <div class="icon-circle">
          <ion-icon name="shield"></ion-icon>
        </div>
        <h3>Admin</h3>
        <p>I am an admin</p>
      </div>
    </div>

    <ion-button expand="block" (click)="choose()" class="main-btn"
                [disabled]="!selectedRole">
      Choose
    </ion-button>

    <p class="link">Have an account ?
      <span class="accent" (click)="goToLogin()">sign in</span>
    </p>
  </div>
</ion-content>
